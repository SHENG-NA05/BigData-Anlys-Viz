version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smart-curation-postgres
    restart: always
    environment:
      POSTGRES_DB: curation_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d curation_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: bigdata-curation-backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/curation_db
      GEMINI_API_KEY: mock-api-key
      OPENROUTER_API_KEY: ""

  frontend:
    build: ./frontend
    container_name: bigdata-curation-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  postgres_data:
